<aside
  class="sticky top-0 flex h-dvh flex-col gap-[17px] overflow-hidden border-r border-edge bg-sidebar px-3 pt-5 pb-4 max-[900px]:items-center max-[900px]:px-3 max-[620px]:static max-[620px]:h-auto max-[620px]:w-full max-[620px]:flex-row max-[620px]:justify-between max-[620px]:border-r-0 max-[620px]:border-b max-[620px]:px-3.5 max-[620px]:py-2.5"
  [class]="store.sidebarCollapsed() ? 'items-center !px-[11px]' : ''"
>
  <div
    class="flex min-h-[34px] items-center justify-between px-2 max-[900px]:flex-col max-[900px]:gap-3 max-[900px]:px-0 max-[620px]:flex-row"
    [class]="store.sidebarCollapsed() ? 'flex-col gap-3 !px-0' : ''"
  >
    <div class="flex items-center gap-2.5 whitespace-nowrap text-[17px] font-semibold">
      <span class="grid size-[30px] shrink-0 place-items-center rounded-lg" aria-hidden="true">
        <svg viewBox="0 0 100 94" width="26" height="26" fill="none">
          <path d="M0 88 L32 6 L64 88 M48 46 L96 46" stroke="var(--color-accent)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </span>
    </div>
    <button class="grid size-[34px] cursor-pointer place-items-center rounded-[7px] border-0 bg-transparent p-0 text-muted hover:bg-surface-2 hover:text-content max-[620px]:hidden" type="button" (click)="store.toggleSidebar()" aria-label="ย่อแถบด้านข้าง">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
    </button>
  </div>

  <button
    class="flex min-h-11 w-full cursor-pointer items-center gap-2.5 rounded-[7px] border border-accent-hover bg-accent px-3 text-white hover:bg-accent-hover max-[900px]:w-11 max-[900px]:justify-center max-[900px]:px-0"
    [class]="store.sidebarCollapsed() ? '!w-11 justify-center !px-0' : ''"
    type="button"
    (click)="store.newTask()"
  >
    <svg class="size-[18px]" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14M5 12h14"/></svg>
    @if (!store.sidebarCollapsed()) { <span class="max-[900px]:hidden">งานใหม่</span> }
  </button>

  @if (!store.sidebarCollapsed()) {
    <nav class="flex-1 overflow-y-auto [scrollbar-width:thin] max-[900px]:hidden" aria-label="รายการงาน">
      <div class="mx-2.5 mt-[9px] mb-2 flex items-center justify-between">
        <p class="text-[13px] text-muted">งานของฉัน</p>
        <button
          class="cursor-pointer rounded-[5px] border-0 bg-transparent p-0 text-[11px] text-faint hover:text-danger disabled:cursor-not-allowed disabled:opacity-40"
          type="button"
          [disabled]="store.tasks().length === 0"
          title="เคลียร์ประวัติแชททั้งหมด"
          (click)="clearAllHistory()"
        >
          เคลียร์ทั้งหมด
        </button>
      </div>
      <input
        class="mb-2 w-full rounded-md border border-edge bg-surface-2 px-2.5 py-1.5 text-xs text-content outline-none placeholder:text-faint focus:border-accent"
        type="search"
        placeholder="ค้นหางาน..."
        [value]="searchText()"
        (input)="searchText.set($any($event.target).value)"
      />
      @for (task of filteredTasks(); track task.id) {
        <div
          class="group relative flex min-h-14 w-full cursor-pointer items-center gap-2.5 rounded-[7px] border-0 bg-transparent px-2.5 py-2 text-left text-muted hover:bg-surface-2 hover:text-content"
          [class]="store.activeTaskId() === task.id ? 'bg-surface-2 text-content shadow-[inset_2px_0_0_#f5a623]' : ''"
          role="button"
          tabindex="0"
          (click)="store.selectTask(task.id)"
          (keydown.enter)="store.selectTask(task.id)"
          (keydown.space)="$event.preventDefault(); store.selectTask(task.id)"
        >
          <span class="size-2 shrink-0 rounded-full" [class]="task.status === 'working' ? 'bg-accent shadow-[0_0_0_3px_rgba(245,166,35,.15)]' : 'bg-faint'"></span>
          <span class="grid min-w-0 gap-0.5">
            <strong class="overflow-hidden text-ellipsis whitespace-nowrap text-[13px] font-medium">{{ task.title }}</strong>
            <small class="text-[11px]" [class]="store.activeTaskId() === task.id ? 'text-accent-hover' : 'text-faint'">{{ store.statusLabel(task.status) }}</small>
          </span>
          <time class="ml-auto text-[11px] text-faint group-hover:hidden group-focus-within:hidden">{{ formatLocalTime(task.updatedAt) }}</time>
          <span class="ml-auto hidden items-center gap-1 group-hover:flex group-focus-within:flex">
            <button class="cursor-pointer border-0 bg-transparent p-1 text-faint hover:text-content" type="button" title="เปลี่ยนชื่อ" aria-label="เปลี่ยนชื่อ" (click)="renameTask($event, task.id, task.title)">✎</button>
            <button class="cursor-pointer border-0 bg-transparent p-1 text-faint hover:text-content" type="button" title="เก็บเข้าคลัง" aria-label="เก็บเข้าคลัง" (click)="archiveTask($event, task.id)">▣</button>
            <button class="cursor-pointer border-0 bg-transparent p-1 text-faint hover:text-danger" type="button" title="ลบ" aria-label="ลบงาน" (click)="deleteTask($event, task.id, task.title)">×</button>
          </span>
        </div>
      }
    </nav>

    <div class="grid grid-cols-[1fr_34px] gap-[9px] max-[900px]:hidden">
      <div class="flex min-h-[42px] items-center rounded-[7px] border border-edge px-[11px] text-xs text-muted">
        <span class="mr-2 size-2 rounded-full bg-success"></span> Ollama ทำงานในเครื่อง
      </div>
      <a class="grid size-[34px] cursor-pointer place-items-center rounded-[7px] border-0 bg-transparent p-0 text-muted no-underline hover:bg-surface-2 hover:text-content" routerLink="/settings" routerLinkActive="bg-surface-2 text-content" aria-label="ตั้งค่า" title="ตั้งค่าโฟลเดอร์ที่อนุญาตให้สแกน">
        <svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 11-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 11-4 0v-.09a1.65 1.65 0 00-1-1.51 1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 11-2.83-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 110-4h.09a1.65 1.65 0 001.51-1 1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 112.83-2.83l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 114 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 112.83 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 110 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
      </a>
    </div>
  }
</aside>
