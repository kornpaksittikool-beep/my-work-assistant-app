<footer class="relative z-10 mx-auto w-[min(100%,780px)] bg-[linear-gradient(transparent,#ffffff_22%)] px-3 pt-4 pb-2 max-[620px]:px-3 max-[620px]:pb-2">
  <div class="flex min-h-7 items-center justify-between gap-3 px-3 text-[11px] text-muted">
    @if (store.isWorking() || store.pendingPermission()) {
      <div class="flex min-w-0 items-center gap-2.5" aria-live="polite">
        <span class="relative flex size-4 shrink-0 items-center justify-center">
          <span class="absolute size-4 animate-spin rounded-full border-2 border-accent/25 border-t-accent"></span>
        </span>
        <span class="min-w-0">
          <strong class="block overflow-hidden text-ellipsis whitespace-nowrap font-medium text-content">{{ store.currentWork().label }}</strong>
          <small class="block overflow-hidden text-ellipsis whitespace-nowrap text-[10px] text-faint">{{ store.currentWork().detail }} · {{ store.workingSeconds() }} วิ</small>
        </span>
      </div>
      <button class="shrink-0 cursor-pointer rounded px-2 py-1 text-[11px] text-muted hover:bg-surface-2 hover:text-content" type="button" (click)="store.stopWorking()">■ หยุด</button>
    } @else {
      <span class="flex items-center gap-[9px]"><i class="size-[7px] rounded-full bg-success shadow-[0_0_0_3px_rgba(79,205,117,.12)]"></i>พร้อมรับคำสั่ง</span>
    }
  </div>
  <div class="rounded-[22px] border border-edge bg-app-bg px-3.5 pt-3 pb-2.5 shadow-[0_18px_45px_rgba(0,0,0,.10)]">
    <textarea class="min-h-11 max-h-[150px] w-full resize-none border-0 bg-transparent px-1.5 py-0.5 text-[13px] leading-[1.55] text-content outline-none placeholder:text-faint" [(ngModel)]="draft" (keydown)="onKeydown($event)" placeholder="พิมพ์คำสั่งหรือคำถาม..."></textarea>
    <div class="flex items-center justify-between gap-2">
      <div class="flex items-center gap-2">
        <button
          class="inline-flex h-8 shrink-0 cursor-pointer items-center gap-1.5 rounded-full border-0 bg-transparent px-2 text-[11px] text-muted transition-colors hover:bg-surface-2 hover:text-content"
          type="button"
          (click)="store.refreshModel()"
          title="กดเพื่อตรวจสอบโมเดลอีกครั้ง"
          aria-label="โมเดลที่กำลังใช้งาน {{ store.activeModel() }} กดเพื่อตรวจสอบอีกครั้ง"
        >
          <span
            class="size-2 rounded-full"
            [class]="store.modelAvailable() === null ? 'animate-pulse bg-faint' : store.modelAvailable() ? 'bg-success' : 'bg-danger'"
          ></span>
          <span class="max-[720px]:hidden">Model:</span>
          <strong class="max-w-40 overflow-hidden text-ellipsis whitespace-nowrap font-medium text-content">{{ store.activeModel() }}</strong>
        </button>
      </div>
      @if (store.isWorking()) {
        <button class="grid size-8 cursor-pointer place-items-center rounded-full border border-edge-strong bg-surface text-muted hover:bg-surface-2" type="button" (click)="store.stopWorking()" aria-label="หยุดการทำงาน"><span class="size-3 animate-spin rounded-full border-2 border-muted/25 border-t-muted"></span></button>
      } @else {
        <button class="grid size-8 cursor-pointer place-items-center rounded-full border-0 bg-accent text-white hover:bg-accent-hover disabled:cursor-not-allowed disabled:bg-surface-3 disabled:text-faint" type="button" (click)="send()" [disabled]="!draft.trim()" aria-label="ส่งข้อความ"><svg class="size-4" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 19V5M6 11l6-6 6 6"/></svg></button>
      }
    </div>
  </div>
</footer>
