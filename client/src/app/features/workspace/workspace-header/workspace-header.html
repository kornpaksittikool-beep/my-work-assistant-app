<header class="flex min-h-[64px] shrink-0 justify-between gap-5 border-b border-edge/80 bg-app-bg/90 px-7 py-2.5 max-[900px]:px-5 max-[620px]:min-h-[60px] max-[620px]:px-[15px] max-[620px]:py-2.5">
  <div class="flex min-w-0 items-center gap-3">
    <svg class="shrink-0 text-muted max-[620px]:hidden" viewBox="0 0 24 24" aria-hidden="true"><path d="M6 3h9l4 4v14H6zM15 3v5h4"/></svg>
    <div>
      <div class="flex items-center gap-[7px]"><h1 class="m-0 overflow-hidden text-ellipsis whitespace-nowrap text-[15px] font-medium max-[620px]:max-w-[190px]">{{ store.activeTaskTitle() }}</h1></div>
      <div class="mt-1 flex items-center gap-2 text-[10px] text-faint">
        <button class="cursor-pointer rounded-[5px] border border-edge bg-transparent px-[7px] py-[3px]" type="button" (click)="store.toggleWorkspacePanel()">Workspace: <strong class="font-normal text-muted">{{ store.activeTask()?.workspacePath || 'กำลังโหลด...' }}</strong></button>
        @if (store.pendingPermission(); as permission) { <span class="rounded-[5px] border border-edge px-[7px] py-[3px] max-[900px]:hidden">ขอสิทธิ์: <strong class="font-normal text-muted">{{ permission.path }}</strong></span> }
      </div>
    </div>
  </div>
  <button
    class="self-center cursor-pointer rounded-md border border-edge bg-transparent px-3 py-1.5 text-xs text-muted hover:border-danger/60 hover:text-danger disabled:cursor-not-allowed disabled:opacity-40"
    type="button"
    [disabled]="!store.canDeleteChat()"
    title="ลบแชทนี้ออกจากประวัติ"
    (click)="requestDeleteChat()"
  >
    ลบแชท
  </button>
</header>

@if (isDeleteConfirmationOpen()) {
  <div class="fixed inset-0 z-50 flex items-center justify-center bg-black/55 px-4" role="presentation" (click)="cancelDeleteChat()">
    <section
      class="w-full max-w-sm rounded-xl border border-edge bg-app-bg p-5 shadow-2xl"
      role="dialog"
      aria-modal="true"
      aria-labelledby="delete-chat-title"
      (click)="$event.stopPropagation()"
    >
      <h2 id="delete-chat-title" class="m-0 text-base font-semibold">ลบแชทนี้?</h2>
      <p class="mb-5 mt-2 text-sm leading-6 text-muted">แชท “{{ store.activeTaskTitle() }}” และประวัติข้อความทั้งหมดจะถูกลบออกจากรายการ การทำรายการนี้ย้อนกลับไม่ได้</p>
      <div class="flex justify-end gap-2">
        <button class="cursor-pointer rounded-md border border-edge bg-transparent px-3 py-2 text-sm text-muted" type="button" (click)="cancelDeleteChat()">ยกเลิก</button>
        <button class="cursor-pointer rounded-md border border-danger bg-danger px-3 py-2 text-sm text-white" type="button" (click)="confirmDeleteChat()">ลบแชท</button>
      </div>
    </section>
  </div>
}
