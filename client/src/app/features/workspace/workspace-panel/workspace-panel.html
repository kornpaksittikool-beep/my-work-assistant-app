<aside class="fixed top-0 right-0 z-20 h-dvh w-[min(360px,90vw)] border-l border-edge-strong bg-[#0d1015] p-[22px] shadow-[-20px_0_60px_rgba(0,0,0,.35)]">
  <header class="flex items-start justify-between border-b border-edge pb-[18px]">
    <div class="grid gap-[3px]"><strong>Workspace</strong><small class="text-muted">{{ store.activeTask()?.workspacePath || 'กำลังโหลด...' }}</small></div>
    <button class="grid size-[34px] cursor-pointer place-items-center rounded-[7px] border-0 bg-transparent p-0 text-muted hover:bg-surface-2 hover:text-content" type="button" (click)="store.toggleWorkspacePanel()" aria-label="ปิด">×</button>
  </header>
  <div class="px-[3px] py-[18px] text-[13px] leading-[1.6] text-muted">
    <p>ยังไม่เชื่อมการดูไฟล์จริง — จะแสดงผลลัพธ์จาก <code>scan_directory</code> (1-scan-file) เมื่อ agent เรียกใช้งานในบทสนทนา</p>
  </div>
  <div class="absolute right-[22px] bottom-[22px] left-[22px] flex items-center gap-2.5 rounded-[7px] border border-edge bg-surface p-[13px]"><span class="size-2 rounded-full bg-success"></span><div class="grid gap-0.5 text-xs"><strong>Workspace ปัจจุบัน</strong><small class="text-muted">{{ store.activeTask()?.workspacePath }}</small></div></div>
</aside>
